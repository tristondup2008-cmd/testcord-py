<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kinetic Vault | S3 Storage Console Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary-container": "#852233",
              "surface-container-lowest": "#ffffff",
              "secondary-fixed-dim": "#ffaeb4",

              "tertiary-fixed-dim": "#c989f1",
              "inverse-surface": "#0c0f10",
              "surface-dim": "#d1d5d7",
              "on-primary-fixed-variant": "#600100",
              "on-primary": "#ffefed",
              "error-dim": "#a70138",
              "tertiary-fixed": "#d797ff",
              "primary": "#ae2819",
              "surface-variant": "#dadddf",
              "error-container": "#f74b6d",
              "on-secondary": "#ffefef",
              "secondary-dim": "#902a3a",
              "on-error": "#ffefef",
              "background": "#f5f6f7",
              "primary-dim": "#9d1b0e",
              "inverse-primary": "#ff624c",
              "error": "#b41340",
              "primary-container": "#ff7763",
              "outline-variant": "#abadae",
              "on-surface-variant": "#595c5d",
              "primary-fixed": "#ff7763",
              "secondary-container": "#ffc2c6",
              "surface": "#f5f6f7",
              "outline": "#757778",
              "on-surface": "#2c2f30",
              "tertiary-container": "#d797ff",
              "secondary-fixed": "#ffc2c6",
              "inverse-on-surface": "#9b9d9e",
              "surface-container": "#e6e8ea",
              "on-tertiary-fixed": "#2a0044",
              "on-secondary-fixed-variant": "#912b3b",
              "surface-container-low": "#eff1f2",
              "tertiary-dim": "#6f3395",
              "on-secondary-fixed": "#6a0c21",
              "on-tertiary-fixed-variant": "#56187d",
              "surface-container-high": "#e0e3e4",
              "on-tertiary": "#fdeeff",
              "on-primary-fixed": "#000000",
              "secondary": "#a03646",
              "on-primary-container": "#4e0100",
              "on-background": "#2c2f30",

              "surface-tint": "#ae2819"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>body { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .fluid-bg {
            background-color: #f8f6f6;
            background-image: 
                radial-gradient(at 0% 0%, rgba(234, 83, 63, 0.15) 0px, transparent 60%),
                radial-gradient(at 100% 100%, rgba(234, 83, 63, 0.2) 0px, transparent 60%),
                url("data:image/svg+xml,%3Csvg viewBox='0 0 1000 1000' xmlns='http://www.w3.org/2000/svg'%3%3Cfilter id='noiseFilter'%3%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3%3C/filter%3%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3%3C/svg%3E");
            background-blend-mode: normal, normal, overlay;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
        }
        .coral-gradient {
            background: linear-gradient(135deg, #ae2819 0%, #ff7763 100%);
        }</style>
</head>
<body class="fluid-bg min-h-screen flex flex-col items-center justify-center p-6 text-on-surface selection:bg-primary-container selection:text-on-primary-container">
<!-- Hero Decorative Element: Fluid Coral Waves -->
<div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
<svg class="absolute top-[-10%] left-[-10%] w-[120%] h-[120%] opacity-20" preserveaspectratio="none" viewbox="0 0 1000 1000"><path d="M0,1000 C300,800 400,900 700,700 C900,550 1000,600 1000,400 L1000,0 L0,0 Z" fill="rgba(234, 83, 63, 0.3)"></path><path d="M0,1000 C200,850 500,950 800,750 C950,650 1000,700 1000,500 L1000,0 L0,0 Z" fill="rgba(234, 83, 63, 0.2)"></path></svg>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-md">
<!-- Brand Identity -->
<div class="flex flex-col items-center mb-10">
<div class="w-16 h-16 coral-gradient rounded-2xl flex items-center justify-center shadow-lg shadow-primary/20 mb-4 transform -rotate-6">
<span class="material-symbols-outlined text-white text-4xl" style="font-variation-settings: 'FILL' 1;">
                    bolt
                </span>
</div>
<h1 class="text-3xl font-extrabold tracking-tight text-on-surface">Kinetic Vault</h1>
<p class="text-on-surface-variant font-medium mt-1">High-Performance Object Storage</p>
</div>
<!-- Login Card -->
<div class="glass-card rounded-lg p-10 shadow-[0_32px_64px_-12px_rgba(0,0,0,0.08)]">
<div class="mb-8">
<h2 class="text-xl font-bold text-on-surface tracking-tight">Console Access</h2>
<p class="text-sm text-on-surface-variant mt-1">Enter your credentials to manage your buckets.</p>
</div>
<form class="space-y-6">
<!-- Access Key Input -->
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1" for="access-key">Access Key</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-xl">key</span>
</div>
<input class="block w-full pl-11 pr-4 py-3.5 bg-surface-container-low border-0 rounded-DEFAULT text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-200 outline-none" id="access-key" name="access-key" placeholder="Enter Access Key" type="text"/>
</div>
</div>
<!-- Secret Key Input -->
<div class="space-y-2">
<div class="flex justify-between items-end ml-1">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant" for="secret-key">Secret Key</label>
<a class="text-xs font-semibold text-primary hover:text-primary-dim transition-colors" href="#">Forgot key?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-xl">lock</span>
</div>
<input class="block w-full pl-11 pr-4 py-3.5 bg-surface-container-low border-0 rounded-DEFAULT text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-200 outline-none" id="secret-key" name="secret-key" placeholder="••••••••••••" type="password"/>
</div>
</div>
<!-- Remember Me / Session -->
<div class="flex items-center px-1">
<input class="w-4 h-4 rounded border-outline text-primary focus:ring-primary/30 transition-all" id="remember" type="checkbox"/>
<label class="ml-3 text-sm font-medium text-on-surface-variant" for="remember">Stay signed in for 24 hours</label>
</div>
<!-- Submit Button -->
<button class="w-full coral-gradient text-white py-4 rounded-DEFAULT font-bold text-sm tracking-wide shadow-xl shadow-primary/25 hover:scale-[1.02] active:scale-[0.98] transition-all duration-300 flex items-center justify-center space-x-2" type="submit">
<span>Login to Console</span>
<span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</form>
<div class="mt-8 pt-8 border-t border-surface-container-highest/30 flex items-center justify-center space-x-6">
<div class="flex items-center space-x-2 text-on-surface-variant/60">
<span class="material-symbols-outlined text-lg">terminal</span>
<span class="text-xs font-bold tracking-tighter">CLI ACCESS</span>
</div>
<div class="flex items-center space-x-2 text-on-surface-variant/60">
<span class="material-symbols-outlined text-lg">api</span>
<span class="text-xs font-bold tracking-tighter">REST API</span>
</div>
</div>
</div>
</main>
<!-- Footer Information -->
<footer class="fixed bottom-0 w-full px-8 py-6 flex flex-col md:flex-row justify-between items-center text-on-surface-variant/50 z-10">
<div class="flex items-center space-x-4 mb-4 md:mb-0">
<div class="flex items-center space-x-1.5">
<div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
<span class="text-[10px] font-bold tracking-widest uppercase">SERVER ONLINE</span>
</div>
<div class="h-4 w-[1px] bg-surface-container-highest"></div>
<span class="text-[10px] font-bold tracking-widest uppercase">PROD-US-EAST-01-CLUSTER</span>
</div>
<div class="flex items-center space-x-6">
<a class="text-[10px] font-bold tracking-widest uppercase hover:text-primary transition-colors" href="#">Security Status</a>
<a class="text-[10px] font-bold tracking-widest uppercase hover:text-primary transition-colors" href="#">Documentation</a>
<a class="text-[10px] font-bold tracking-widest uppercase hover:text-primary transition-colors" href="#">Help</a>
</div>
</footer>
<!-- Background Decoration Card -->
<div class="fixed top-12 right-12 w-64 h-64 pointer-events-none transform rotate-12 blur-3xl opacity-25">
<div class="w-full h-full bg-primary rounded-full"></div>
</div>
<div class="fixed bottom-12 left-12 w-96 h-96 pointer-events-none transform -rotate-12 blur-3xl opacity-15">
<div class="w-full h-full bg-secondary rounded-full"></div>
</div>
</body></html>
